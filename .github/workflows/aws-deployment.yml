name: Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPOSITORY: test/devops-app-backend
  ECR_FRONTEND_REPOSITORY: test/devops-app-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image URIs
        id: images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_short }}
        run: |
          echo "backend_image=$ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
        run: |
          docker build \
            -f backend/Dockerfile \
            --target prod \
            -t "$BACKEND_IMAGE" \
            -t "${BACKEND_IMAGE%:*}:latest" \
            backend

          docker push "$BACKEND_IMAGE"
          docker push "${BACKEND_IMAGE%:*}:latest"

      - name: Build and push frontend image
        env:
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
        run: |
          docker build \
            -f frontend/Dockerfile \
            --target prod \
            -t "$FRONTEND_IMAGE" \
            -t "${FRONTEND_IMAGE%:*}:latest" \
            frontend

          docker push "$FRONTEND_IMAGE"
          docker push "${FRONTEND_IMAGE%:*}:latest"

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend service
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_BACKEND_SERVICE: ${{ secrets.ECS_BACKEND_SERVICE }}
          ECS_BACKEND_CONTAINER_NAME: ${{ secrets.ECS_BACKEND_CONTAINER_NAME }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
        run: |
          set -euo pipefail

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_BACKEND_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query "taskDefinition" > taskdef.json

          jq --arg IMAGE "$BACKEND_IMAGE" --arg NAME "$ECS_BACKEND_CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            )
          ' taskdef.json > taskdef-updated.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-updated.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_BACKEND_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_BACKEND_SERVICE"

      - name: Deploy frontend service
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_FRONTEND_SERVICE: ${{ secrets.ECS_FRONTEND_SERVICE }}
          ECS_FRONTEND_CONTAINER_NAME: ${{ secrets.ECS_FRONTEND_CONTAINER_NAME }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
        run: |
          set -euo pipefail

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_FRONTEND_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query "taskDefinition" > taskdef.json

          jq --arg IMAGE "$FRONTEND_IMAGE" --arg NAME "$ECS_FRONTEND_CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            )
          ' taskdef.json > taskdef-updated.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-updated.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_FRONTEND_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_FRONTEND_SERVICE"
  