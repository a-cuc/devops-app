name: Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPOSITORY: test/devops-app-backend
  ECR_FRONTEND_REPOSITORY: test/devops-app-frontend
  ECS_CLUSTER: devops-app-test-2
  ECS_BACKEND_SERVICE: devops-app-backend-3c12
  ECS_BACKEND_CONTAINER_NAME: Main
  ECS_FRONTEND_SERVICE: devops-app-frontend-de39
  ECS_FRONTEND_CONTAINER_NAME: Main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image URIs
        id: images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_short }}
        run: |
          echo "backend_image=$ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
        run: |
          docker build \
            -f backend/Dockerfile \
            --target prod \
            -t "$BACKEND_IMAGE" \
            -t "${BACKEND_IMAGE%:*}:latest" \
            backend

          docker push "$BACKEND_IMAGE"
          docker push "${BACKEND_IMAGE%:*}:latest"

      - name: Build and push frontend image
        env:
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
        run: |
          docker build \
            -f frontend/Dockerfile \
            --target prod \
            -t "$FRONTEND_IMAGE" \
            -t "${FRONTEND_IMAGE%:*}:latest" \
            frontend

          docker push "$FRONTEND_IMAGE"
          docker push "${FRONTEND_IMAGE%:*}:latest"

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend service
        env:
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_BACKEND_SERVICE: ${{ env.ECS_BACKEND_SERVICE }}
          ECS_BACKEND_CONTAINER_NAME: ${{ env.ECS_BACKEND_CONTAINER_NAME }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
        run: |
          set -euo pipefail

          echo "[DEBUG] AWS region: $AWS_REGION"
          aws sts get-caller-identity

          SERVICE_DESC=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_BACKEND_SERVICE" \
            --output json)

          SERVICE_COUNT=$(echo "$SERVICE_DESC" | jq '.services | length')
          SERVICE_FAILURES=$(echo "$SERVICE_DESC" | jq -r '.failures[]? | "\(.arn) :: \(.reason)"')
          TASK_DEF_ARN=$(echo "$SERVICE_DESC" | jq -r '
            .services[0] as $svc
            | [
                $svc.taskDefinition,
                ($svc.deployments[]? | select(.status == "PRIMARY") | .taskDefinition),
                ($svc.deployments[]? | .taskDefinition),
                ($svc.taskSets[]? | select(.status == "PRIMARY") | .taskDefinition),
                ($svc.taskSets[]? | .taskDefinition)
              ]
            | map(select(. != null and . != ""))
            | .[0] // "None"
          ')

          echo "[DEBUG] Backend service: $ECS_BACKEND_SERVICE"
          echo "[DEBUG] Backend services found: $SERVICE_COUNT"
          if [ -n "$SERVICE_FAILURES" ]; then
            echo "[DEBUG] Backend service lookup failures:"
            echo "$SERVICE_FAILURES"
          fi
          echo "[DEBUG] Backend task definition ARN: $TASK_DEF_ARN"
          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "[ERROR] Could not resolve backend task definition from service '$ECS_BACKEND_SERVICE' in cluster '$ECS_CLUSTER'."
            echo "[DEBUG] Backend service payload snapshot:"
            echo "$SERVICE_DESC" | jq '.services[0] // {} | {
              serviceArn,
              serviceName,
              clusterArn,
              status,
              launchType,
              schedulingStrategy,
              deploymentController,
              desiredCount,
              runningCount,
              pendingCount,
              taskDefinition,
              deployments: ((.deployments // []) | map({id, status, rolloutState, taskDefinition, desiredCount, runningCount, pendingCount})),
              taskSets: ((.taskSets // []) | map({id, status, taskDefinition, computedDesiredCount, runningCount, pendingCount}))
            }'
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query "taskDefinition" > taskdef.json

          jq --arg IMAGE "$BACKEND_IMAGE" --arg NAME "$ECS_BACKEND_CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            )
          ' taskdef.json > taskdef-updated.json

          if ! jq -e --arg NAME "$ECS_BACKEND_CONTAINER_NAME" '.containerDefinitions[] | select(.name == $NAME)' taskdef-updated.json > /dev/null; then
            echo "[ERROR] Backend container name '$ECS_BACKEND_CONTAINER_NAME' not found in task definition."
            echo "[DEBUG] Available backend container names:"
            jq -r '.containerDefinitions[].name' taskdef-updated.json
            exit 1
          fi

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-updated.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_BACKEND_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_BACKEND_SERVICE"

      - name: Deploy frontend service
        env:
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_FRONTEND_SERVICE: ${{ env.ECS_FRONTEND_SERVICE }}
          ECS_FRONTEND_CONTAINER_NAME: ${{ env.ECS_FRONTEND_CONTAINER_NAME }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
        run: |
          set -euo pipefail

          echo "[DEBUG] AWS region: $AWS_REGION"
          aws sts get-caller-identity

          SERVICE_DESC=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_FRONTEND_SERVICE" \
            --output json)

          SERVICE_COUNT=$(echo "$SERVICE_DESC" | jq '.services | length')
          SERVICE_FAILURES=$(echo "$SERVICE_DESC" | jq -r '.failures[]? | "\(.arn) :: \(.reason)"')
          TASK_DEF_ARN=$(echo "$SERVICE_DESC" | jq -r '
            .services[0] as $svc
            | [
                $svc.taskDefinition,
                ($svc.deployments[]? | select(.status == "PRIMARY") | .taskDefinition),
                ($svc.deployments[]? | .taskDefinition),
                ($svc.taskSets[]? | select(.status == "PRIMARY") | .taskDefinition),
                ($svc.taskSets[]? | .taskDefinition)
              ]
            | map(select(. != null and . != ""))
            | .[0] // "None"
          ')

          echo "[DEBUG] Frontend service: $ECS_FRONTEND_SERVICE"
          echo "[DEBUG] Frontend services found: $SERVICE_COUNT"
          if [ -n "$SERVICE_FAILURES" ]; then
            echo "[DEBUG] Frontend service lookup failures:"
            echo "$SERVICE_FAILURES"
          fi
          echo "[DEBUG] Frontend task definition ARN: $TASK_DEF_ARN"
          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "[ERROR] Could not resolve frontend task definition from service '$ECS_FRONTEND_SERVICE' in cluster '$ECS_CLUSTER'."
            echo "[DEBUG] Frontend service payload snapshot:"
            echo "$SERVICE_DESC" | jq '.services[0] // {} | {
              serviceArn,
              serviceName,
              clusterArn,
              status,
              launchType,
              schedulingStrategy,
              deploymentController,
              desiredCount,
              runningCount,
              pendingCount,
              taskDefinition,
              deployments: ((.deployments // []) | map({id, status, rolloutState, taskDefinition, desiredCount, runningCount, pendingCount})),
              taskSets: ((.taskSets // []) | map({id, status, taskDefinition, computedDesiredCount, runningCount, pendingCount}))
            }'
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query "taskDefinition" > taskdef.json

          jq --arg IMAGE "$FRONTEND_IMAGE" --arg NAME "$ECS_FRONTEND_CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            )
          ' taskdef.json > taskdef-updated.json

          if ! jq -e --arg NAME "$ECS_FRONTEND_CONTAINER_NAME" '.containerDefinitions[] | select(.name == $NAME)' taskdef-updated.json > /dev/null; then
            echo "[ERROR] Frontend container name '$ECS_FRONTEND_CONTAINER_NAME' not found in task definition."
            echo "[DEBUG] Available frontend container names:"
            jq -r '.containerDefinitions[].name' taskdef-updated.json
            exit 1
          fi

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-updated.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_FRONTEND_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_FRONTEND_SERVICE"
  